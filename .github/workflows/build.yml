name: Build & Release

# ─── Triggers ─────────────────────────────────────────────────────────────────
# • Push to main/master  → build all platforms, upload as workflow artifacts
# • Push a tag v*.*.*    → build + create a public GitHub Release with installers
# • Pull request         → build to catch compile errors early
on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch/tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false          # keep building other platforms if one fails
      matrix:
        include:
          # ── macOS Apple Silicon (aarch64) ──────────────────────────────────
          - name: macOS (Apple Silicon)
            os: macos-latest
            rust_target: ''
            tauri_args: ''
            artifact_glob: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app.tar.gz

          # ── macOS Intel (x86_64) ──────────────────────────────────────────
          - name: macOS (Intel)
            os: macos-13
            rust_target: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'
            artifact_glob: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app.tar.gz

          # ── Windows ───────────────────────────────────────────────────────
          - name: Windows
            os: windows-latest
            rust_target: ''
            tauri_args: ''
            artifact_glob: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe

          # ── Linux (Ubuntu) ────────────────────────────────────────────────
          - name: Linux (Ubuntu)
            os: ubuntu-22.04
            rust_target: ''
            tauri_args: ''
            artifact_glob: |
              target/release/bundle/deb/*.deb
              target/release/bundle/appimage/*.AppImage

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux system dependencies ──────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            app/src-tauri -> app/src-tauri/target

      # ── Frontend ────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      # ── Tauri build ─────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          # in repo Settings → Secrets for signed updater bundles
        with:
          projectPath: app
          # Only publish a GitHub Release on tag pushes
          tagName:      ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName:  ${{ startsWith(github.ref, 'refs/tags/') && format('LDAP Studio {0}', github.ref_name) || '' }}
          releaseBody:  |
            ## LDAP Studio ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `*_aarch64.dmg` |
            | macOS (Intel)         | `*_x86_64.dmg` |
            | Windows               | `*_x64-setup.exe` or `*.msi` |
            | Linux                 | `*.AppImage` or `*.deb` |

            > **macOS**: Right-click → Open the first time (the app is not App Store-signed).
          releaseDraft:   ${{ startsWith(github.ref, 'refs/tags/') }}
          prerelease:     false
          args:           ${{ matrix.tauri_args }}

      # ── Upload artifacts (non-tag builds) ───────────────────────────────────
      - name: Upload build artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ldap-studio-${{ matrix.os }}
          retention-days: 7
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app.tar.gz
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

